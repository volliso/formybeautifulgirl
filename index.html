<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Моему котенку ❤️</title>
    <style>
        /* ===== ПОДКЛЮЧАЕМ ШРИФТЫ ===== */
        @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&family=Montserrat:wght@300;400;500;600&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(145deg, #fce4ec, #f8bbd0, #f48fb1);
            font-family: 'Montserrat', 'Segoe UI', sans-serif;
            flex-direction: column;
            padding: 20px;
            background-attachment: fixed;
            overflow-x: hidden;
        }

        /* Декоративные круги */
        body::before,
        body::after {
            content: '';
            position: fixed;
            border-radius: 50%;
            opacity: 0.15;
            pointer-events: none;
            z-index: 0;
        }
        body::before {
            width: 300px;
            height: 300px;
            background: #ec407a;
            top: -80px;
            right: -80px;
        }
        body::after {
            width: 400px;
            height: 400px;
            background: #f06292;
            bottom: -120px;
            left: -120px;
        }

        .container {
            text-align: center;
            max-width: 460px;
            width: 100%;
            position: relative;
            z-index: 1;
            padding: 10px 0;
        }

        /* ===== ЗАГОЛОВОК — РАСПИСНОЙ ШРИФТ ===== */
        .title {
            font-family: 'Caveat', cursive;
            font-size: 34px;
            font-weight: 700;
            color: #880e4f;
            margin-bottom: 18px;
            letter-spacing: 1px;
            text-shadow: 0 2px 15px rgba(236, 64, 122, 0.15);
            opacity: 0.85;
            word-break: break-word;
        }
        .title .star {
            display: inline-block;
            animation: sparkle 2.5s infinite;
        }

        @keyframes sparkle {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        @media (max-width: 480px) {
            .title {
                font-size: 28px;
                margin-bottom: 14px;
            }
        }

        /* ===== КНОПКА-СЕРДЦЕ ===== */
        .heart-btn {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(145deg, #f06292, #ec407a, #d81b60);
            font-size: 72px;
            cursor: pointer;
            box-shadow:
                0 12px 40px rgba(233, 30, 99, 0.35),
                inset 0 -4px 10px rgba(0, 0, 0, 0.08),
                inset 0 4px 15px rgba(255, 255, 255, 0.25);
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1),
                box-shadow 0.3s ease;
            margin: 0 auto;
            display: block;
            color: white;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            position: relative;
            font-family: 'Segoe UI', sans-serif;
        }

        /* Пульсирующий ореол */
        .heart-btn::after {
            content: '';
            position: absolute;
            top: -10px;
            left: -10px;
            right: -10px;
            bottom: -10px;
            border-radius: 50%;
            border: 2px solid rgba(233, 30, 99, 0.15);
            animation: pulse-ring 2.5s ease-out infinite;
        }

        @keyframes pulse-ring {
            0% { transform: scale(1); opacity: 0.6; }
            100% { transform: scale(1.35); opacity: 0; }
        }

        .heart-btn:active {
            transform: scale(0.82);
            box-shadow: 0 5px 20px rgba(233, 30, 99, 0.3);
        }
        .heart-btn:hover {
            transform: scale(1.04);
            box-shadow: 0 16px 50px rgba(233, 30, 99, 0.45);
        }

        @media (max-width: 480px) {
            .heart-btn {
                width: 130px;
                height: 130px;
                font-size: 58px;
            }
            .heart-btn::after {
                top: -8px;
                left: -8px;
                right: -8px;
                bottom: -8px;
            }
        }

        /* ===== БЛОК С ПОСЛАНИЕМ ===== */
        .prediction-box {
            margin-top: 35px;
            padding: 30px 24px;
            background: rgba(255, 255, 255, 0.82);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 28px;
            box-shadow:
                0 8px 32px rgba(233, 30, 99, 0.10),
                inset 0 1px 0 rgba(255, 255, 255, 0.5);
            min-height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255, 255, 255, 0.3);
            transition: box-shadow 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .prediction-box:hover {
            box-shadow: 0 12px 40px rgba(233, 30, 99, 0.16);
        }

        /* ===== ПОСЛАНИЕ — ОДИН РОВНЫЙ ШРИФТ ===== */
        .prediction-text {
            font-family: 'Montserrat', sans-serif;
            font-size: 20px;
            font-weight: 400;
            color: #4a1a2e;
            line-height: 1.8;
            word-break: break-word;
            opacity: 0;
            transform: scale(0.5) translateY(30px);
            transition: opacity 0.5s cubic-bezier(0.34, 1.56, 0.64, 1),
                        transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        /* Когда послание видимо — оно выплывает */
        .prediction-text.visible {
            opacity: 1;
            transform: scale(1) translateY(0);
        }

        /* Подсказка в боксе (пока нет послания) */
        .prediction-text.hint {
            opacity: 0.5;
            transform: scale(1) translateY(0);
            font-weight: 300;
            font-size: 16px;
            color: #ad1457;
            letter-spacing: 0.5px;
        }

        @media (max-width: 480px) {
            .prediction-box {
                padding: 24px 16px;
                min-height: 100px;
                border-radius: 22px;
                margin-top: 28px;
            }
            .prediction-text {
                font-size: 17px;
                line-height: 1.7;
            }
            .prediction-text.hint {
                font-size: 14px;
            }
        }

        /* ===== ПОДПИСЬ ===== */
        .subtitle {
            font-family: 'Montserrat', sans-serif;
            font-weight: 300;
            color: #880e4f;
            margin-top: 18px;
            font-size: 13px;
            opacity: 0.55;
            letter-spacing: 1.5px;
        }

        /* Счётчик */
        .counter {
            font-family: 'Montserrat', sans-serif;
            font-weight: 300;
            color: #ad1457;
            font-size: 12px;
            margin-top: 12px;
            opacity: 0.35;
            letter-spacing: 0.5px;
        }

        /* ===== АНИМАЦИЯ СЕРДЕЧКА ПРИ КЛИКЕ ===== */
        @keyframes heartBeat {
            0% { transform: scale(1); }
            25% { transform: scale(0.88); }
            50% { transform: scale(1.12); }
            75% { transform: scale(0.95); }
            100% { transform: scale(1); }
        }

        .heart-beat {
            animation: heartBeat 0.4s ease;
        }

        /* ===== ДОПОЛНИТЕЛЬНАЯ АНИМАЦИЯ — МЕЛКИЕ СЕРДЕЧКИ ВЫЛЕТАЮТ ===== */
        @keyframes floatHearts {
            0% {
                opacity: 1;
                transform: translateY(0) scale(1) rotate(0deg);
            }
            100% {
                opacity: 0;
                transform: translateY(-120px) scale(0.3) rotate(40deg);
            }
        }

        .floating-heart {
            position: fixed;
            font-size: 24px;
            pointer-events: none;
            z-index: 100;
            animation: floatHearts 1.2s ease-out forwards;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- ===== ЗАГОЛОВОК — РАСПИСНОЙ ШРИФТ ===== -->
        <div class="title">
            <span class="star">✦</span> Моему котенку <span class="star">✦</span>
        </div>

        <button class="heart-btn" id="heartBtn">❤️</button>

        <!-- ===== БЛОК С ПОСЛАНИЕМ ===== -->
        <div class="prediction-box" id="predictionBox">
            <div class="prediction-text hint" id="predictionText">Нажми на сердечко!</div>
        </div>

        <div class="subtitle">каждый раз — новое послание</div>
        <div class="counter" id="counter">❤️ 0 посланий</div>
    </div>

    <script>
        // ============================================
        // ТВОИ ФРАЗЫ — ДЛИННЫЕ ТИРЕ (—)
        // ============================================
        const phrases = [
            "С тобой хочется говорить часами",
            "Ты мыслишь глубоко, и это притягивает",
            "Ты сводишь меня с ума",
            "С тобой интересно говорить абсолютно обо всем",
            "Ты всегда находишь правильные слова в любой ситуации",
            "Кто-то думает о тебе прямо сейчас (я)",
            "Пусть твой день будет наполнен радостью",
            "Ты заслуживаешь всего самого лучшего",
            "Твоя улыбка делает мир ярче",
            "Ты сильнее, чем ты думаешь",
            "Ты сияешь даже когда просто улыбаешься",
            "Я тону в твоих глазах",
            "Ты ослепительна",
            "You are my sorcerer",
            "Ты красива во всем",
            "Ты выглядишь потрясающе в любое время суток и в любом состоянии",
            "Ты притягиваешь людей",
            "Ты — воплощение изящности",
            "Ты неотразима даже когда не стараешься",
            "Никогда не сдавайся и иди к своей цели до конца",
            "Твое прошлое не определяет твое будущее. Ты можешь начать с чистого листа в любой момент",
            "Ты как вино — с каждым годом только лучше",
            "Ты вдохновляешь меня",
            "Ты все сможешь",
            "Ты талантлива во всем",
            "Я восхищаюсь и горжусь тобой",
            "Рядом с тобой хочется становиться лучше",
            "Я хочу прожить с тобой всю жизнь",
            "Я принимаю тебя всегда и уважаю твой выбор",
            "С тобой спокойно и уютно",
            "Ты умеешь любить так, как никто другой (но я люблю тебя сильнее)",
            "Sometimes I think you used one wish willow on me"
        ];

        // ============================================
        // ЛОГИКА БЕЗ ПОВТОРОВ
        // ============================================
        let remainingPhrases = [];
        let clickCount = 0;
        let isFirstClick = true; // Для показа подсказки

        function shuffleArray(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function resetPhrases() {
            remainingPhrases = shuffleArray([...phrases]);
        }

        function getNextPhrase() {
            if (remainingPhrases.length === 0) {
                resetPhrases();
            }
            return remainingPhrases.pop();
        }

        resetPhrases();

        // ============================================
        // ЭЛЕМЕНТЫ
        // ============================================
        const heartBtn = document.getElementById('heartBtn');
        const predictionText = document.getElementById('predictionText');
        const predictionBox = document.getElementById('predictionBox');
        const counterEl = document.getElementById('counter');

        // ============================================
        // ФУНКЦИЯ ПОКАЗА ПОСЛАНИЯ
        // ============================================
        function showNewMessage() {
            const newPhrase = getNextPhrase();

            // Убираем класс "hint" (подсказка)
            predictionText.classList.remove('hint');

            // Меняем текст
            predictionText.textContent = newPhrase;

            // Делаем видимым с эффектом выплывания
            predictionText.classList.remove('visible');
            void predictionText.offsetWidth; // триггер перезапуска анимации
            predictionText.classList.add('visible');

            // Анимация сердечка
            heartBtn.classList.remove('heart-beat');
            void heartBtn.offsetWidth;
            heartBtn.classList.add('heart-beat');

            // Летающие сердечки (эффект, будто из сердечка вылетают)
            createFloatingHearts();

            // Счётчик
            clickCount++;
            counterEl.textContent = `❤️ ${clickCount} посланий`;
        }

        // ============================================
        // ЭФФЕКТ — МЕЛКИЕ СЕРДЕЧКА ВЫЛЕТАЮТ
        // ============================================
        function createFloatingHearts() {
            const emojis = ['❤️', '💗', '💖', '💕', '💓'];
            const rect = heartBtn.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;

            for (let i = 0; i < 8; i++) {
                const heart = document.createElement('div');
                heart.className = 'floating-heart';
                heart.textContent = emojis[Math.floor(Math.random() * emojis.length)];
                
                // Случайное смещение от центра
                const angle = Math.random() * Math.PI * 2;
                const distance = 20 + Math.random() * 40;
                const xOffset = Math.cos(angle) * distance;
                const yOffset = Math.sin(angle) * distance - 20;
                
                heart.style.left = (centerX + xOffset) + 'px';
                heart.style.top = (centerY + yOffset) + 'px';
                heart.style.fontSize = (16 + Math.random() * 20) + 'px';
                heart.style.animationDuration = (0.8 + Math.random() * 0.6) + 's';
                
                document.body.appendChild(heart);
                
                // Удаляем после анимации
                setTimeout(() => {
                    heart.remove();
                }, 1500);
            }
        }

        // ============================================
        // ОБРАБОТЧИК КЛИКА
        // ============================================
        heartBtn.addEventListener('click', showNewMessage);

        // ============================================
        // ИНТЕГРАЦИЯ С TELEGRAM
        // ============================================
        if (window.Telegram && window.Telegram.WebApp) {
            window.Telegram.WebApp.ready();
            window.Telegram.WebApp.expand();
        }

        // ============================================
        // ПРИ ЗАГРУЗКЕ — ПОКАЗЫВАЕМ ПОДСКАЗКУ
        // ============================================
        window.addEventListener('DOMContentLoaded', function() {
            // Показываем подсказку "Нажми на сердечко!"
            predictionText.classList.add('hint');
            predictionText.textContent = 'Нажми на сердечко!';
            // Делаем её видимой (без анимации выплывания)
            predictionText.classList.add('visible');
        });
    </script>

</body>
</html>
