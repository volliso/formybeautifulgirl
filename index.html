<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Послания ❤️</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(145deg, #fce4ec, #f8bbd0, #f48fb1);
            font-family: 'Segoe UI', 'Arial', system-ui, -apple-system, sans-serif;
            flex-direction: column;
            padding: 20px;
            background-attachment: fixed;
        }

        /* Декоративные круги на фоне */
        body::before,
        body::after {
            content: '';
            position: fixed;
            border-radius: 50%;
            opacity: 0.2;
            pointer-events: none;
            z-index: 0;
        }
        body::before {
            width: 300px;
            height: 300px;
            background: #ec407a;
            top: -80px;
            right: -80px;
        }
        body::after {
            width: 400px;
            height: 400px;
            background: #f06292;
            bottom: -120px;
            left: -120px;
        }

        .container {
            text-align: center;
            max-width: 440px;
            width: 100%;
            position: relative;
            z-index: 1;
            padding: 10px 0;
        }

        /* Заголовок */
        .title {
            color: #880e4f;
            font-size: 18px;
            font-weight: 600;
            letter-spacing: 2px;
            margin-bottom: 20px;
            opacity: 0.8;
            text-shadow: 0 2px 10px rgba(236, 64, 122, 0.2);
        }
        .title span {
            display: inline-block;
            animation: sparkle 2s infinite;
        }

        @keyframes sparkle {
            0%,
            100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.2);
            }
        }

        /* Кнопка-сердце */
        .heart-btn {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(145deg, #f06292, #ec407a, #d81b60);
            font-size: 75px;
            cursor: pointer;
            box-shadow:
                0 12px 40px rgba(233, 30, 99, 0.4),
                inset 0 -4px 10px rgba(0, 0, 0, 0.1),
                inset 0 4px 15px rgba(255, 255, 255, 0.3);
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1),
                box-shadow 0.3s ease;
            margin: 0 auto;
            display: block;
            color: white;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            position: relative;
        }

        /* Пульсирующий эффект вокруг кнопки */
        .heart-btn::after {
            content: '';
            position: absolute;
            top: -8px;
            left: -8px;
            right: -8px;
            bottom: -8px;
            border-radius: 50%;
            background: transparent;
            border: 2px solid rgba(233, 30, 99, 0.2);
            animation: pulse-ring 2s ease-out infinite;
        }

        @keyframes pulse-ring {
            0% {
                transform: scale(1);
                opacity: 0.7;
            }
            100% {
                transform: scale(1.3);
                opacity: 0;
            }
        }

        .heart-btn:active {
            transform: scale(0.82);
            box-shadow: 0 5px 20px rgba(233, 30, 99, 0.3);
        }

        .heart-btn:hover {
            transform: scale(1.04);
            box-shadow: 0 16px 50px rgba(233, 30, 99, 0.5);
        }

        @media (max-width: 480px) {
            .heart-btn {
                width: 130px;
                height: 130px;
                font-size: 60px;
            }
            .heart-btn::after {
                top: -6px;
                left: -6px;
                right: -6px;
                bottom: -6px;
            }
        }

        /* Блок с предсказанием */
        .prediction-box {
            margin-top: 35px;
            padding: 28px 24px;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 28px;
            box-shadow:
                0 8px 32px rgba(233, 30, 99, 0.12),
                inset 0 1px 0 rgba(255, 255, 255, 0.6);
            min-height: 110px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255, 255, 255, 0.4);
            transition: box-shadow 0.3s ease;
        }

        .prediction-box:hover {
            box-shadow: 0 12px 40px rgba(233, 30, 99, 0.18);
        }

        .prediction-text {
            font-size: 20px;
            color: #4a1a2e;
            line-height: 1.7;
            font-weight: 500;
            transition: opacity 0.3s ease;
            word-break: break-word;
        }

        @media (max-width: 480px) {
            .prediction-box {
                padding: 22px 16px;
                min-height: 90px;
                border-radius: 22px;
                margin-top: 28px;
            }
            .prediction-text {
                font-size: 17px;
                line-height: 1.6;
            }
        }

        /* Подпись */
        .subtitle {
            color: #880e4f;
            margin-top: 18px;
            font-size: 13px;
            opacity: 0.6;
            letter-spacing: 1px;
            font-weight: 400;
        }
        .subtitle span {
            display: inline-block;
            animation: sparkle 3s infinite;
        }

        /* Счётчик нажатий (необязательный эстетичный элемент) */
        .counter {
            color: #ad1457;
            font-size: 12px;
            margin-top: 14px;
            opacity: 0.4;
            letter-spacing: 0.5px;
        }

        /* Анимация появления */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(16px) scale(0.96);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .fade-in {
            animation: fadeIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        /* Бонусная анимация для сердечка при клике */
        @keyframes heartBeat {
            0% {
                transform: scale(1);
            }
            25% {
                transform: scale(0.9);
            }
            50% {
                transform: scale(1.1);
            }
            75% {
                transform: scale(0.95);
            }
            100% {
                transform: scale(1);
            }
        }

        .heart-beat {
            animation: heartBeat 0.4s ease;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="title">✦ ТВОЙ МОМЕНТ ✦</div>

        <button class="heart-btn" id="heartBtn">❤️</button>

        <div class="prediction-box" id="predictionBox">
            <div class="prediction-text" id="predictionText">Нажми на сердечко ❤️</div>
        </div>

        <div class="subtitle">✨ каждый раз — новое послание ✨</div>
        <div class="counter" id="counter">💗 0 посланий получено</div>
    </div>

    <script>
        // ============================================
        // ВСЕ ФРАЗЫ — С ЭМОДЗИ (добавлены где не было)
        // ============================================
        const phrases = [
            "С тобой хочется говорить часами 🗣️",
            "Ты мыслишь глубоко, и это притягивает 🌊",
            "Ты сводишь меня с ума 🌀",
            "С тобой интересно говорить абсолютно обо всём 💬",
            "Ты всегда находишь правильные слова в любой ситуации 🎯",
            "Кто-то думает о тебе прямо сейчас (я) 💭",
            "Пусть твой день будет наполнен радостью! ☀️",
            "Ты заслуживаешь всего самого лучшего 💎",
            "Твоя улыбка делает мир ярче 😊",
            "Ты сильнее, чем ты думаешь 💪",
            "Ты сияешь, даже когда просто улыбаешься ✨",
            "Я тону в твоих глазах 🌊👀",
            "Ты ослепительна 🌟",
            "You are my sorcerer ❤️🔮",
            "Ты красива во всём 🌹",
            "Ты выглядишь потрясающе в любое время суток 🌙☀️",
            "Ты притягиваешь людей 🧲",
            "Ты — воплощение изящности 🦢",
            "Ты неотразима, даже когда не стараешься 💫",
            "Никогда не сдавайся — иди к своей цели до конца 🚀",
            "Твоё прошлое не определяет будущее. Начни с чистого листа 📖",
            "Ты как вино — с каждым годом только лучше 🍷",
            "Ты вдохновляешь меня 🌸",
            "Ты всё сможешь 💯",
            "Ты талантлива во всём 🎨",
            "Я восхищаюсь и горжусь тобой 🏆",
            "Рядом с тобой хочется становиться лучше 🌱",
            "С тобой спокойно и уютно 🕊️",
            "Ты умеешь любить так, как никто другой ❤️‍🔥",
            "Sometimes I think you used one wish willow on me 🌙✨",
            "Твой ум — самое сексуальное оружие 🧠🔥",
            "Ты — настоящий победитель в жизни 👑",
            "Твоя энергетика заряжает 🔋⚡",
            "Ты — главная героиня своей истории 📖👸",
            "Ты прекрасна без макияжа и с ним — всегда 🌸",
            "Твой смех — моя любимая музыка 🎵",
            "Ты — мечта, воплощённая в реальность 💭✨",
            "Твоя уверенность вдохновляет 🌟",
            "Ты справляешься со всем так легко, будто у тебя есть суперсилы 🦸‍♀️",
            "Ты — лучшее, что случилось со мной 🥹❤️",
            "Твоя душа такая же красивая, как и ты сама 🌷",
            "Ты делаешь этот мир ярче и добрее 🌍",
            "Ты — моя самая любимая мысль 🧠❤️",
            "Твои глаза светятся, когда ты улыбаешься ✨👀",
            "Ты — искусство, которое хочется рассматривать вечно 🖼️",
            "Твоя сила и нежность — идеальный баланс ⚖️",
            "Ты покоряешь своей искренностью 💖",
            "Ты — воплощение грации и стиля 🌸",
            "Твоя улыбка — мой личный источник света 🔆",
            "Ты — самая очаровательная девушка на свете 🌹"
        ];

        // ============================================
        // ЛОГИКА
        // ============================================
        let lastIndex = -1;
        let clickCount = 0;

        function getRandomPhrase() {
            let randomIndex;
            do {
                randomIndex = Math.floor(Math.random() * phrases.length);
            } while (randomIndex === lastIndex && phrases.length > 1);
            lastIndex = randomIndex;
            return phrases[randomIndex];
        }

        const heartBtn = document.getElementById('heartBtn');
        const predictionText = document.getElementById('predictionText');
        const predictionBox = document.getElementById('predictionBox');
        const counterEl = document.getElementById('counter');

        heartBtn.addEventListener('click', function() {
            // Новая фраза
            const newPhrase = getRandomPhrase();
            predictionText.textContent = newPhrase;

            // Анимация появления
            predictionBox.classList.remove('fade-in');
            void predictionBox.offsetWidth;
            predictionBox.classList.add('fade-in');

            // Анимация сердечка
            heartBtn.classList.remove('heart-beat');
            void heartBtn.offsetWidth;
            heartBtn.classList.add('heart-beat');

            // Счётчик
            clickCount++;
            counterEl.textContent = `💗 ${clickCount} посланий получено`;
        });

        // ============================================
        // ИНТЕГРАЦИЯ С TELEGRAM
        // ============================================
        if (window.Telegram && window.Telegram.WebApp) {
            window.Telegram.WebApp.ready();
            window.Telegram.WebApp.expand();
        }

        // ============================================
        // ПЕРВАЯ ФРАЗА ПРИ ЗАГРУЗКЕ (опционально)
        // ============================================
        window.addEventListener('DOMContentLoaded', function() {
            // Показываем первую случайную фразу сразу
            const firstPhrase = phrases[Math.floor(Math.random() * phrases.length)];
            predictionText.textContent = firstPhrase;
            predictionBox.classList.add('fade-in');
            // Убираем анимацию после первого показа
            setTimeout(() => {
                predictionBox.classList.remove('fade-in');
            }, 600);
        });
    </script>

</body>
</html>
